<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Solutions Architect Associate (SAA-C03) Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1923; color: #e8e8e8; min-height: 100vh; }

  .container { max-width: 800px; margin: 0 auto; padding: 20px; }

  /* Header */
  header { text-align: center; padding: 30px 0 20px; }
  header h1 { font-size: 1.6rem; color: #ff9900; margin-bottom: 6px; }
  header p { color: #889; font-size: 0.9rem; }

  /* Stats bar */
  .stats { display: flex; gap: 16px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
  .stat { background: #1a2634; border-radius: 10px; padding: 12px 20px; text-align: center; min-width: 100px; }
  .stat .num { font-size: 1.5rem; font-weight: 700; color: #ff9900; }
  .stat .label { font-size: 0.75rem; color: #889; text-transform: uppercase; letter-spacing: 1px; }

  /* Progress */
  .progress-wrap { background: #1a2634; border-radius: 8px; height: 8px; margin: 20px 0; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #ff9900, #ffb84d); border-radius: 8px; transition: width 0.4s ease; }

  /* Start screen */
  .start-screen { text-align: center; padding: 40px 0; }
  .start-screen h2 { font-size: 1.3rem; margin-bottom: 20px; }
  .domain-select { display: flex; flex-direction: column; gap: 10px; max-width: 420px; margin: 0 auto 30px; }
  .domain-btn { background: #1a2634; border: 2px solid #2a3a4a; color: #e8e8e8; padding: 14px 18px;
    border-radius: 10px; cursor: pointer; font-size: 0.95rem; text-align: left; transition: all 0.2s; }
  .domain-btn:hover { border-color: #ff9900; background: #1f2f3f; }
  .domain-btn.selected { border-color: #ff9900; background: #2a2010; }
  .domain-btn .tag { display: inline-block; background: #ff990022; color: #ff9900; font-size: 0.7rem;
    padding: 2px 8px; border-radius: 4px; margin-left: 8px; font-weight: 600; }
  .count-select { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 24px; }
  .count-select label { color: #889; font-size: 0.9rem; }
  .count-select select { background: #1a2634; color: #e8e8e8; border: 2px solid #2a3a4a; border-radius: 8px;
    padding: 8px 14px; font-size: 1rem; cursor: pointer; }
  .count-select select:focus { outline: none; border-color: #ff9900; }

  /* Question card */
  .question-card { background: #1a2634; border-radius: 14px; padding: 30px; margin: 20px 0; }
  .q-domain { font-size: 0.75rem; color: #ff9900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .q-number { font-size: 0.85rem; color: #667; margin-bottom: 14px; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { background: #0f1923; border: 2px solid #2a3a4a; border-radius: 10px; padding: 14px 18px;
    cursor: pointer; transition: all 0.2s; font-size: 0.95rem; line-height: 1.4; display: flex; align-items: flex-start; gap: 12px; }
  .option:hover:not(.disabled) { border-color: #ff9900; background: #1f2530; }
  .option .letter { display: flex; align-items: center; justify-content: center; min-width: 30px; height: 30px;
    border-radius: 50%; background: #2a3a4a; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
  .option.correct { border-color: #22c55e; background: #0f2918; }
  .option.correct .letter { background: #22c55e; color: #000; }
  .option.wrong { border-color: #ef4444; background: #2a1010; }
  .option.wrong .letter { background: #ef4444; color: #fff; }
  .option.disabled { cursor: default; opacity: 0.7; }
  .option.correct.disabled { opacity: 1; }
  .option.picked { border-color: #ff9900; background: #2a2010; }
  .option.picked .letter { background: #ff9900; color: #000; }

  .btn-flag { background: transparent; border: 2px solid #ef4444; color: #ef4444; padding: 10px 18px;
    border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .btn-flag:hover { background: #ef444420; }
  .flag-icon::before { content: "\26A0"; }

  /* Explanation */
  .explanation { background: #12202e; border-left: 4px solid #ff9900; border-radius: 0 10px 10px 0;
    padding: 16px 20px; margin-top: 20px; font-size: 0.9rem; line-height: 1.5; color: #bcc; display: none; }
  .explanation.show { display: block; animation: fadeIn 0.3s ease; }

  /* Buttons */
  .btn { background: #ff9900; color: #000; border: none; padding: 14px 32px; border-radius: 10px;
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn:hover { background: #ffb84d; transform: translateY(-1px); }
  .btn:disabled { background: #4a4a4a; color: #888; cursor: not-allowed; transform: none; }
  .btn-outline { background: transparent; border: 2px solid #ff9900; color: #ff9900; }
  .btn-outline:hover { background: #ff990015; }
  .actions { display: flex; justify-content: center; gap: 12px; margin-top: 24px; }

  /* Results */
  .results { text-align: center; padding: 30px 0; }
  .results h2 { font-size: 1.8rem; margin-bottom: 8px; }
  .score-circle { width: 160px; height: 160px; border-radius: 50%; margin: 24px auto;

  .score-circle.score { background: radial-gradient(circle, #2a201080, #2a2010); border: 4px solid #ff9900; color: #ff9900; }
  .score-circle .pct-label { font-size: 0.8rem; font-weight: 400; color: #889; }
  .results .breakdown { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 24px 0; }
  .results .bd-item { background: #1a2634; border-radius: 10px; padding: 14px 18px; min-width: 160px; }
  .results .bd-item .bd-domain { font-size: 0.75rem; color: #889; margin-bottom: 4px; }
  .results .bd-item .bd-score { font-size: 1.2rem; font-weight: 700; }

  /* Review list */
  .review-list { text-align: left; margin-top: 20px; }
  .review-item { background: #1a2634; border-radius: 10px; padding: 18px; margin-bottom: 10px; }
  .review-item .ri-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .review-item .ri-status { font-size: 0.8rem; font-weight: 700; padding: 3px 10px; border-radius: 6px; }
  .review-item .ri-status.correct { background: #22c55e22; color: #22c55e; }
  .review-item .ri-status.wrong { background: #ef444422; color: #ef4444; }
  .review-item .ri-q { font-size: 0.95rem; margin-bottom: 6px; }
  .review-item .ri-answer { font-size: 0.85rem; color: #889; }

  .hidden { display: none !important; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Timer */
  .timer { display: flex; align-items: center; gap: 6px; color: #889; font-size: 0.9rem; }
  .timer svg { width: 16px; height: 16px; fill: #889; }
  .exam-panel { background: #1a2634; border-radius: 12px; padding: 14px; margin-top: 14px; }
  .exam-summary { display: flex; gap: 10px; flex-wrap: wrap; font-size: 0.8rem; color: #bcc; margin-bottom: 10px; }
  .exam-summary span { background: #0f1923; border-radius: 8px; padding: 6px 10px; }
  .palette { display: grid; grid-template-columns: repeat(10, minmax(0, 1fr)); gap: 6px; }
  .palette-btn {
    border: 1px solid #2a3a4a;
    background: #0f1923;
    color: #d1d5db;
    border-radius: 8px;
    padding: 8px 0;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .palette-btn.answered { border-color: #22c55e; color: #22c55e; }
  .palette-btn.marked { border-color: #ef4444; color: #ef4444; }
  .palette-btn.current { border-color: #ff9900; background: #2a2010; color: #ff9900; font-weight: 700; }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 12px; }
    .question-card { padding: 20px; }
    header h1 { font-size: 1.3rem; }
    .stat { min-width: 70px; padding: 8px 12px; }
  }
</style>

<script src="domain1.js"></script>

<script>
const RAW_QUESTIONS = [
  ...(window.domain1Questions || []),
  ...(window.domain2Questions || []),
  ...(window.domain3Questions || []),
  ...(window.domain4Questions || [])
];

let OPTION_HINT_AUDIT = null;
let QUESTION_AUDIT = null;
let QUESTIONS = [];
let ALL_QUESTIONS = [];

const OPTION_LABEL_EXCEPTIONS = new Set([
  'Amazon RDS for MySQL',
  'Amazon RDS for PostgreSQL',
  'Amazon RDS for MariaDB',
  'Amazon RDS for Oracle',
  'Amazon RDS for SQL Server',
  'Amazon Aurora PostgreSQL-Compatible Edition',
  'Amazon Aurora MySQL-Compatible Edition',
  'Amazon FSx for Windows File Server',
  'Amazon FSx for Lustre'
]);

const OPTION_HINT_SEPARATORS = [
  ' integrated with ',
  ' queried in ',
  ' queried via ',
  ' used for ',
  ' designed for ',
  ' built for ',
  ' for ',
  ' with ',
  ' to ',
  ' via ',
  ' using '
];

function sanitizeAwsOptionLabel(text) {
  const trimmed = (text || '').trim();
  if (!trimmed || OPTION_LABEL_EXCEPTIONS.has(trimmed)) return trimmed;
  if (!/^(Amazon|AWS)\b/.test(trimmed)) return trimmed;

  for (const separator of OPTION_HINT_SEPARATORS) {
    const idx = trimmed.indexOf(separator);
    if (idx === -1) continue;
    const tail = trimmed.slice(idx + separator.length).trim();
    if (!tail || !/^[a-z]/.test(tail)) continue;

    const candidate = trimmed.slice(0, idx).trim();
    if (candidate && !OPTION_LABEL_EXCEPTIONS.has(candidate)) return candidate;
  }

  return trimmed;
}

function sanitizeEmDashOptionLabel(text) {
  const trimmed = (text || '').trim();
  const dashIdx = trimmed.indexOf(' — ');
  if (dashIdx === -1) return trimmed;

  const candidate = trimmed.slice(0, dashIdx).trim();
  const tail = trimmed.slice(dashIdx + 3).trim();
  if (!candidate || !tail) return trimmed;

  return candidate;
}

function sanitizeQuestionOptionHints(questions) {
  let changedQuestions = 0;
  let changedOptions = 0;
  let collisionSkips = 0;

  const cleaned = questions.map((q) => {
    if (!q || !Array.isArray(q.opts)) return q;

    let localChanges = 0;
    const nextOpts = q.opts.map((opt) => {
      const cleanedOpt = sanitizeEmDashOptionLabel(sanitizeAwsOptionLabel(opt));
      if (cleanedOpt !== opt) localChanges++;
      return cleanedOpt;
    });

    if (!localChanges) return q;

    const normalized = nextOpts.map((opt) => normalizeQuestionText(opt));
    if (new Set(normalized).size !== nextOpts.length) {
      collisionSkips++;
      return q;
    }

    changedQuestions++;
    changedOptions += localChanges;
    return { ...q, opts: nextOpts };
  });

  return {
    cleaned,
    report: {
      changedQuestions,
      changedOptions,
      collisionSkips
    }
  };
}

function normalizeQuestionText(text) {
  return (text || '').toLowerCase().replace(/\s+/g, ' ').trim();
}

function stripNoiseWords(text) {
  return (text || '')
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\b(the|a|an|for|to|of|in|on|with|and|or|by|from|that|this|which|what|when|where|is|are|be|as|at|it|its|their|they|team|company|startup|organization|enterprise)\b/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function buildNearDuplicateSignature(text) {
  const cleaned = stripNoiseWords(text);
  if (!cleaned) return '';
  const tokens = cleaned.split(' ').filter(Boolean);
  const deduped = Array.from(new Set(tokens));
  deduped.sort();
  return deduped.slice(0, 24).join('|');
}

function jaccardSimilarity(a, b) {
  const setA = new Set((a || '').split('|').filter(Boolean));
  const setB = new Set((b || '').split('|').filter(Boolean));
  if (setA.size === 0 || setB.size === 0) return 0;
  let intersection = 0;
  setA.forEach((t) => { if (setB.has(t)) intersection++; });
  const union = setA.size + setB.size - intersection;
  return union === 0 ? 0 : intersection / union;
}

function questionStyleBucket(text) {
  if (auditConstraintLike(text)) return 'constraint';
  if (auditScenarioLike(text)) return 'scenario';
  if (auditDefinitionLike(text)) return 'definition';
  return 'concept';
}

function similarityClusterKey(q) {
  const style = questionStyleBucket(q.q);
  const answerShape = q.multi ? `m${q.ans.length}` : 'm1';
  const anchor = buildNearDuplicateSignature(q.q).split('|').slice(0, 7).join('|');
  return `${q.domain}|${q.task || 'na'}|${style}|${answerShape}|${anchor}`;
}

function correctAnswerTexts(q) {
  const answerIndices = q.multi ? q.ans : [q.ans];
  return answerIndices.map((i) => normalizeQuestionText(q.opts[i]));
}

function questionTemplateKey(q) {
  const answers = correctAnswerTexts(q).sort().join('&');
  const answerShape = q.multi ? `m${q.ans.length}` : 'm1';
  return `${q.domain}|${q.task || 'na'}|${answerShape}|${answers}`;
}

function conceptFamilyKey(q) {
  // Treat each exam task as its own concept family so official runs
  // spread across unique task objectives before repeating templates.
  return `${q.domain}|${q.task || 'na'}`;
}

function auditDefinitionLike(text) {
  const t = (text || '').toLowerCase();
  return t.includes('what is ') ||
         t.includes('which of the following is the definition') ||
         t.includes('best describes');
}

function auditScenarioLike(text) {
  return /\b(a|an)\s+(startup|company|firm|enterprise|team|organization|platform|provider|agency|bank|retailer)\b/i.test(text || '');
}

function auditConstraintLike(text) {
  const t = (text || '').toLowerCase();
  return t.includes('constraint:') ||
         t.includes('lowest operational overhead') ||
         t.includes('most cost-effective') ||
         t.includes('maximum availability') ||
         t.includes('lowest latency') ||
         t.includes('least maintenance');
}

function auditAndFilterQuestions(questions) {
  const seen = new Set();
  const cleaned = [];
  const flagged = [];
  const acceptedSignatures = [];
  const report = {
    total: questions.length,
    kept: 0,
    removed: 0,
    reasons: {
      invalid_shape: 0,
      invalid_answer_index: 0,
      duplicate_question_text: 0,
      near_duplicate_question: 0,
      too_short: 0,
      not_exam_style: 0
    }
  };

  questions.forEach((q) => {
    const reasons = [];
    if (!q || !q.q || !Array.isArray(q.opts) || q.opts.length < 4 || q.explain === undefined) {
      reasons.push('invalid_shape');
    }

    const text = q && q.q ? q.q : '';
    const norm = normalizeQuestionText(text);
    const signature = buildNearDuplicateSignature(text);

    if (seen.has(norm)) reasons.push('duplicate_question_text');
    else if (norm) seen.add(norm);

    if (text.length < 60) reasons.push('too_short');

    const examStyle = !auditDefinitionLike(text) && (auditConstraintLike(text) || auditScenarioLike(text));
    if (!examStyle) reasons.push('not_exam_style');

    // Catch near-duplicates that differ by template nouns but test the same concept wording.
    const tooSimilar = acceptedSignatures.some((sig) => jaccardSimilarity(sig, signature) >= 0.85);
    if (tooSimilar) reasons.push('near_duplicate_question');

    if (q && q.multi === true) {
      const ansArrayValid = Array.isArray(q.ans) && q.ans.length >= 2 && q.ans.every((i) => Number.isInteger(i) && i >= 0 && i < q.opts.length);
      if (!ansArrayValid) reasons.push('invalid_answer_index');
    } else if (!q || !Number.isInteger(q.ans) || q.ans < 0 || (q.opts && q.ans >= q.opts.length)) {
      reasons.push('invalid_answer_index');
    }

    if (reasons.length > 0) {
      reasons.forEach((r) => { report.reasons[r] = (report.reasons[r] || 0) + 1; });
      flagged.push({ question: text, reasons: reasons });
      return;
    }

    acceptedSignatures.push(signature);
    cleaned.push(q);
  });

  report.kept = cleaned.length;
  report.removed = report.total - report.kept;
  return { cleaned, flagged, report };
}

const DOMAIN_NAMES = {
  1: "Domain 1: Design Secure Architectures",
  2: "Domain 2: Design Resilient Architectures",
  3: "Domain 3: Design High-Performing Architectures",
  4: "Domain 4: Design Cost-Optimized Architectures"
};

let quiz = [], current = 0, score = 0, wrong = 0, answered = false, results = [], timerInterval, seconds = 0;
let officialSimulation = false;
let scoredQuestionIndices = new Set();
let selectedDomain = "all";
let shuffleEnabled = true;
let lastQuizSet = [];
let agentRun = null;
let reviewMarks = new Set();
let remainingSeconds = 0;
const GITHUB_REPO = 'Empyrz901/aws_pract_quiz';
const EXAM_WEIGHTS = { 1: 0.30, 2: 0.26, 3: 0.24, 4: 0.20 };
const OFFICIAL_EXAM_HISTORY_KEY = 'awsQuizRecentOfficial65';
const OFFICIAL_EXAM_HISTORY_LIMIT = 3;
const PRACTICE_QUIZ_HISTORY_KEY = 'awsQuizRecentPractice';
const PRACTICE_QUIZ_HISTORY_LIMIT = 6;
const OFFICIAL_EXAM_EXCLUDED_TERMS = [
  /\baws cloudshell\b/i,
  /\baws codedeploy\b/i,
  /\biot greengrass\b/i,
  /\baws iot greengrass\b/i,
  /\baws elemental mediaconvert\b/i
];

function activeQuestions() {
  return QUESTIONS;
}

function updateQuestionPoolUi() {
  ALL_QUESTIONS = activeQuestions();
  document.getElementById('all-count').textContent = `${ALL_QUESTIONS.length} Q`;
}

function selectDomain(btn) {
  document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedDomain = btn.dataset.domain;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function cloneQuestionWithShuffledOptions(q, doShuffle) {
  if (!doShuffle || !q || !Array.isArray(q.opts)) return q;

  const correct = new Set(q.multi ? q.ans : [q.ans]);
  const entries = q.opts.map((text, originalIndex) => ({
    text,
    correct: correct.has(originalIndex)
  }));
  shuffle(entries);

  const nextAns = entries
    .map((entry, index) => entry.correct ? index : null)
    .filter((index) => index !== null);

  return {
    ...q,
    opts: entries.map((entry) => entry.text),
    ans: q.multi ? nextAns : nextAns[0]
  };
}

function officialExamEligible(q) {
  const haystack = [q.q, ...(q.opts || [])].join(' ');
  return !OFFICIAL_EXAM_EXCLUDED_TERMS.some((pattern) => pattern.test(haystack));
}

function questionFingerprint(q) {

}

function buildRecentPenaltyMaps(history) {
  const questionCounts = new Map();
  const clusterCounts = new Map();
  const conceptCounts = new Map();
  const templateCounts = new Map();

  history.forEach((run) => {
    if (!run || !Array.isArray(run.items)) return;
    run.items.forEach((item) => {
      if (item.question) questionCounts.set(item.question, (questionCounts.get(item.question) || 0) + 1);
      if (item.cluster) clusterCounts.set(item.cluster, (clusterCounts.get(item.cluster) || 0) + 1);
      if (item.concept) conceptCounts.set(item.concept, (conceptCounts.get(item.concept) || 0) + 1);
      if (item.template) templateCounts.set(item.template, (templateCounts.get(item.template) || 0) + 1);
    });
  });

  return { questionCounts, clusterCounts, conceptCounts, templateCounts };
}

function pickCandidateWithVariance(scoredCandidates) {
  if (!scoredCandidates.length) return null;
  const topCount = Math.min(6, scoredCandidates.length);
  const topCandidates = scoredCandidates.slice(0, topCount);
  const floorScore = topCandidates[topCandidates.length - 1].score;
  const weighted = topCandidates.map((candidate, idx) => ({
    candidate,
    weight: Math.max(0.15, candidate.score - floorScore + 0.5 + ((topCount - idx) * 0.12))
  }));
  const totalWeight = weighted.reduce((sum, entry) => sum + entry.weight, 0);
  let roll = Math.random() * totalWeight;
  for (const entry of weighted) {
    roll -= entry.weight;
    if (roll <= 0) return entry.candidate;
  }
  return weighted[weighted.length - 1].candidate;
}

function weightedDraw(pool, count, doShuffle = true) {
  const domains = [1, 2, 3, 4];
  const targets = {};
  let allocated = 0;
  domains.forEach((d) => {
    const n = Math.floor(count * EXAM_WEIGHTS[d]);
    targets[d] = n;
    allocated += n;
  });
  // Distribute rounding remainder by largest domain weights first.
  const remainder = count - allocated;
  const priority = [...domains].sort((a, b) => EXAM_WEIGHTS[b] - EXAM_WEIGHTS[a]);
  for (let i = 0; i < remainder; i++) targets[priority[i % priority.length]]++;

  const picked = [];
  domains.forEach((domain) => {
    const domainPool = pool.filter((q) => q.domain === domain);
    const drawn = pickDiverse(domainPool, targets[domain], doShuffle);
    picked.push(...drawn);
  });

  if (picked.length < count) {
    const pickedSet = new Set(picked);
    const remainingPool = pool.filter((q) => !pickedSet.has(q));
    picked.push(...pickDiverse(remainingPool, count - picked.length, doShuffle));
  }

  return doShuffle ? shuffle(picked).slice(0, count) : picked.slice(0, count);
}

function allocateWeightedCounts(pool, count, weights = EXAM_WEIGHTS, variance = 0) {
  const domains = [1, 2, 3, 4];
  const available = Object.fromEntries(domains.map((d) => [d, pool.filter((q) => q.domain === d).length]));
  const desired = {};

  domains.forEach((domain) => {
    const jitter = variance ? ((Math.random() * 2) - 1) * variance : 0;
    desired[domain] = Math.max(0, weights[domain] + jitter);
  });

  const totalDesired = domains.reduce((sum, d) => sum + desired[d], 0) || 1;
  domains.forEach((domain) => { desired[domain] /= totalDesired; });

  const targets = {};
  let allocated = 0;
  domains.forEach((domain) => {
    const exact = count * desired[domain];
    targets[domain] = Math.min(available[domain], Math.floor(exact));
    allocated += targets[domain];
  });

  const priority = [...domains].sort((a, b) => {
    const fracA = (count * desired[a]) - Math.floor(count * desired[a]);
    const fracB = (count * desired[b]) - Math.floor(count * desired[b]);
    return fracB - fracA;
  });

  let cursor = 0;
  while (allocated < count) {
    const domain = priority[cursor % priority.length];
    if (targets[domain] < available[domain]) {
      targets[domain]++;
      allocated++;
    }
    cursor++;
    if (cursor > 50) break;
  }

  return targets;
}

function buildExamBlueprint(pool, count, mode = 'generic') {
  const stylePools = {
    scenario: pool.filter((q) => questionStyleBucket(q.q) === 'scenario'),
    constraint: pool.filter((q) => questionStyleBucket(q.q) === 'constraint'),
    concept: pool.filter((q) => questionStyleBucket(q.q) === 'concept'),
    definition: pool.filter((q) => questionStyleBucket(q.q) === 'definition')
  };

  let styleWeights;
  let multiRatioRange;

  if (mode === 'scored') {
    styleWeights = {
      scenario: 0.34 + (Math.random() * 0.08),
      constraint: 0.18 + (Math.random() * 0.08),
      concept: 0.18 + (Math.random() * 0.08),
      definition: 0.03 + (Math.random() * 0.04)
    };
    multiRatioRange = [0.12, 0.22];
  } else if (mode === 'unscored') {
    styleWeights = {
      scenario: 0.22 + (Math.random() * 0.18),
      constraint: 0.10 + (Math.random() * 0.10),
      concept: 0.22 + (Math.random() * 0.16),
      definition: 0.04 + (Math.random() * 0.08)
    };
    multiRatioRange = [0.08, 0.25];
  } else {
    styleWeights = {
      scenario: 0.30 + (Math.random() * 0.10),
      constraint: 0.16 + (Math.random() * 0.08),
      concept: 0.18 + (Math.random() * 0.10),
      definition: 0.03 + (Math.random() * 0.05)
    };
    multiRatioRange = [0.10, 0.22];
  }

  const normalizedStyleWeights = { ...styleWeights };
  const styleWeightTotal = Object.values(normalizedStyleWeights).reduce((sum, n) => sum + n, 0) || 1;
  Object.keys(normalizedStyleWeights).forEach((key) => {
    normalizedStyleWeights[key] = normalizedStyleWeights[key] / styleWeightTotal;
  });

  const styleCounts = {};
  let assigned = 0;
  Object.keys(stylePools).forEach((style) => {
    const exact = count * normalizedStyleWeights[style];
    styleCounts[style] = Math.min(stylePools[style].length, Math.floor(exact));
    assigned += styleCounts[style];
  });

  const styleOrder = ['scenario', 'constraint', 'concept', 'definition'];
  let styleCursor = 0;
  while (assigned < count && styleCursor < 100) {
    const key = styleOrder[styleCursor % styleOrder.length];
    if (styleCounts[key] < stylePools[key].length) {
      styleCounts[key]++;
      assigned++;
    }
    styleCursor++;
  }

  const multiAvailable = pool.filter((q) => q.multi).length;
  const multiTarget = Math.max(1, Math.min(
    multiAvailable,
    Math.round(count * (multiRatioRange[0] + Math.random() * (multiRatioRange[1] - multiRatioRange[0])))
  ));

  return {
    styleCounts,
    multiTarget
  };
}

function isDefinitionLikeQuestion(text) {
  const t = (text || '').toLowerCase();
  return t.includes('what is ') ||
         t.includes('which of the following is the definition') ||
         t.includes('best describes');
}

function isScenarioQuestion(text) {
  return /\b(a|an)\s+(startup|company|firm|enterprise|team|organization|platform|provider|agency|bank|retailer)\b/i.test(text || '');
}

function isConstraintDriven(text) {
  const t = (text || '').toLowerCase();
  return t.includes('constraint:') ||
         t.includes('lowest operational overhead') ||
         t.includes('most cost-effective') ||
         t.includes('maximum availability') ||
         t.includes('lowest latency') ||
         t.includes('least maintenance');
}

function isHardExamStyle(q) {
  if (!q || !q.q || !q.opts || q.opts.length < 4) return false;
  return !isDefinitionLikeQuestion(q.q) && (isConstraintDriven(q.q) || isScenarioQuestion(q.q));
}

function questionIssueStyleScore(q) {
  if (!q || !q.q || !Array.isArray(q.opts)) return 0;
  const text = (q.q || '').toLowerCase();
  let score = 0;

  if (isScenarioQuestion(q.q)) score += 1.4;
  if (isConstraintDriven(q.q)) score += 1.1;
  if (q.multi) score += Array.isArray(q.ans) ? Math.min(1.8, 0.9 + (q.ans.length * 0.25)) : 0.9;

  if (/(enforce|detect|prevent|monitor|govern|investigate|restrict|forecast|attribute|compare|audit|protect)/.test(text)) {
    score += 0.8;
  }

  if (/(select two|choose two|use together|combine|which two)/.test(text)) score += 0.9;
  if (text.length >= 95 && text.length <= 240) score += 0.7;
  if (text.length < 70) score -= 0.9;

  if (auditDefinitionLike(q.q)) score -= 1.8;
  if (/which (service|tool) should (they|the team|the company) use\?/i.test(q.q || '')) score -= 0.45;
  if (/which option best addresses this requirement\?$/i.test(q.q || '')) score -= 0.35;

  return score;
}

function pickDiverse(pool, count, doShuffle = true, options = {}) {
  if (!pool.length || count <= 0) return [];
  const ordered = doShuffle ? shuffle([...pool]) : [...pool];
  const picks = [];
  const usedClusters = new Set(options.usedClusters || []);
  const conceptCounts = new Map(options.initialConceptCounts ? Array.from(options.initialConceptCounts.entries()) : []);
  const templateCounts = new Map(options.initialTemplateCounts ? Array.from(options.initialTemplateCounts.entries()) : []);
  const taskCounts = new Map();
  const styleCounts = { scenario: 0, constraint: 0, concept: 0, definition: 0 };
  let multiCount = 0;

  const targetStyleCounts = options.targetStyleCounts || null;
  const targetMultiCount = options.targetMultiCount ?? null;
  const conceptCap = options.conceptCap ?? (count >= 50 ? 2 : 1);
  const minimumScore = options.minimumScore ?? -6;
  const fillToCount = options.fillToCount === true;
  const recentPenaltyMaps = options.recentPenaltyMaps || null;

  while (picks.length < count && ordered.length) {
    const scoredCandidates = ordered.map((q, idx) => {
      const style = questionStyleBucket(q.q);
      const cluster = similarityClusterKey(q);
      const concept = conceptFamilyKey(q);
      const template = questionTemplateKey(q);
      const fingerprint = questionFingerprint(q);
      const conceptSeen = conceptCounts.get(concept) || 0;
      const templateSeen = templateCounts.get(template) || 0;
      const taskSeen = taskCounts.get(q.task || 'na') || 0;

      let score = Math.random() * 0.6;

      if (!usedClusters.has(cluster)) score += 3.5;
      else score -= 2.5;

      if (conceptSeen === 0) score += 3;
      else if (conceptSeen < conceptCap) score += 0.5;
      else score -= 8;

      if (templateSeen === 0) score += 2.6;
      else score -= 5.5 * templateSeen;

      if (taskSeen === 0) score += 2.1;
      else if (count >= 50) score -= 8 * taskSeen;
      else if (taskSeen === 1) score += 0.2;
      else score -= 2.2 * taskSeen;

      if (targetStyleCounts) {
        const target = targetStyleCounts[style] || 0;
        const current = styleCounts[style] || 0;
        if (current < target) score += 2.8;
        else score -= 1.2;
      }

      if (targetMultiCount !== null) {
        if (q.multi && multiCount < targetMultiCount) score += 2.2;
        if (!q.multi && (picks.length - multiCount) < (picks.length < targetMultiCount ? 0 : picks.length - targetMultiCount)) score += 0.4;
        if (q.multi && multiCount >= targetMultiCount) score -= 1.2;
      }

      score += questionIssueStyleScore(q);

      if (questionStyleBucket(q.q) === 'definition' && count >= 50) score -= 1.2;
      if (q.multi && q.ans.length === 3) score += 0.2;
      if (recentPenaltyMaps) {
        const repeatedQuestionCount = recentPenaltyMaps.questionCounts.get(fingerprint) || 0;
        const repeatedClusterCount = recentPenaltyMaps.clusterCounts.get(cluster) || 0;
        const repeatedConceptCount = recentPenaltyMaps.conceptCounts.get(concept) || 0;
        const repeatedTemplateCount = recentPenaltyMaps.templateCounts.get(template) || 0;
        score -= repeatedQuestionCount * 6.5;
        score -= repeatedClusterCount * 2.2;
        score -= repeatedTemplateCount * 4.5;
        score -= repeatedConceptCount * 0.7;
      }

      return { idx, score, q, style, cluster, concept };
    }).sort((a, b) => b.score - a.score);

    const selected = pickCandidateWithVariance(scoredCandidates);
    if (!selected || (!fillToCount && selected.score < minimumScore)) break;

    ordered.splice(selected.idx, 1);
    picks.push(selected.q);
    usedClusters.add(selected.cluster);
    conceptCounts.set(selected.concept, (conceptCounts.get(selected.concept) || 0) + 1);
    templateCounts.set(questionTemplateKey(selected.q), (templateCounts.get(questionTemplateKey(selected.q)) || 0) + 1);
    taskCounts.set(selected.q.task || 'na', (taskCounts.get(selected.q.task || 'na') || 0) + 1);
    styleCounts[selected.style] = (styleCounts[selected.style] || 0) + 1;
    if (selected.q.multi) multiCount++;
  }

  return picks.slice(0, count);
}

function buildOfficialSimulationQuiz(pool, doShuffle = true) {
  const eligiblePool = pool.filter(officialExamEligible);
  const recentPenaltyMaps = buildRecentPenaltyMaps(loadRecentOfficialExamHistory());
  const scoredBasePool = eligiblePool;
  const scoredTargets = allocateWeightedCounts(scoredBasePool, 50, EXAM_WEIGHTS, 0.015);
  const scoredBlueprint = buildExamBlueprint(scoredBasePool, 50, 'scored');
  const scoredConceptCounts = new Map();
  const scoredClusters = new Set();
  let scoredQuestions = [];

  [1, 2, 3, 4].forEach((domain) => {
    const domainPool = scoredBasePool.filter((q) => q.domain === domain);
    const domainStyleTargets = {};
    Object.keys(scoredBlueprint.styleCounts).forEach((style) => {
      domainStyleTargets[style] = Math.round(scoredBlueprint.styleCounts[style] * EXAM_WEIGHTS[domain]);
    });

    const drawn = pickDiverse(domainPool, scoredTargets[domain], doShuffle, {
      targetStyleCounts: domainStyleTargets,
      targetMultiCount: Math.round(scoredBlueprint.multiTarget * EXAM_WEIGHTS[domain]),
      conceptCap: Math.max(2, Math.ceil(scoredTargets[domain] / Math.max(1, new Set(domainPool.map((q) => conceptFamilyKey(q))).size))),
      fillToCount: true,
      initialConceptCounts: scoredConceptCounts,
      usedClusters: scoredClusters,
      recentPenaltyMaps
    });

    drawn.forEach((q) => {
      scoredQuestions.push(q);
      scoredConceptCounts.set(conceptFamilyKey(q), (scoredConceptCounts.get(conceptFamilyKey(q)) || 0) + 1);
      scoredClusters.add(similarityClusterKey(q));
    });
  });

  if (scoredQuestions.length < 50) {
    const scoredSet = new Set(scoredQuestions);
    scoredQuestions = scoredQuestions.concat(pickDiverse(
      scoredBasePool.filter((q) => !scoredSet.has(q)),
      50 - scoredQuestions.length,
      doShuffle,
      {
        targetStyleCounts: scoredBlueprint.styleCounts,
        targetMultiCount: scoredBlueprint.multiTarget,
        conceptCap: Math.max(2, Math.ceil(50 / 14)),
        fillToCount: true,
        initialConceptCounts: scoredConceptCounts,
        usedClusters: scoredClusters,
        recentPenaltyMaps
      }
    ));
  }

  const allScoredSet = new Set(scoredQuestions);
  const unscoredBasePool = eligiblePool.filter((q) => !allScoredSet.has(q));
  const unscoredWeights = { 1: 0.20, 2: 0.26, 3: 0.34, 4: 0.20 };
  const unscoredTargets = allocateWeightedCounts(unscoredBasePool, 15, unscoredWeights, 0.05);
  const unscoredBlueprint = buildExamBlueprint(unscoredBasePool, 15, 'unscored');
  let unscoredQuestions = [];

  [1, 2, 3, 4].forEach((domain) => {
    const domainPool = unscoredBasePool.filter((q) => q.domain === domain);
    const domainStyleTargets = {};
    Object.keys(unscoredBlueprint.styleCounts).forEach((style) => {
      domainStyleTargets[style] = Math.max(0, Math.round(unscoredBlueprint.styleCounts[style] * (unscoredTargets[domain] / 15)));
    });

    const drawn = pickDiverse(domainPool, unscoredTargets[domain], doShuffle, {
      targetStyleCounts: domainStyleTargets,
      targetMultiCount: Math.max(0, Math.round(unscoredBlueprint.multiTarget * (unscoredTargets[domain] / 15))),
      conceptCap: Math.max(2, Math.ceil((scoredTargets[domain] + unscoredTargets[domain]) / Math.max(1, new Set(domainPool.map((q) => conceptFamilyKey(q))).size))),
      fillToCount: true,
      initialConceptCounts: scoredConceptCounts,
      usedClusters: scoredClusters,
      recentPenaltyMaps
    });

    drawn.forEach((q) => {
      unscoredQuestions.push(q);
      scoredConceptCounts.set(conceptFamilyKey(q), (scoredConceptCounts.get(conceptFamilyKey(q)) || 0) + 1);
      scoredClusters.add(similarityClusterKey(q));
    });
  });

  if (unscoredQuestions.length < 15) {
    const allPicked = new Set([...scoredQuestions, ...unscoredQuestions]);
    unscoredQuestions = unscoredQuestions.concat(pickDiverse(
      unscoredBasePool.filter((q) => !allPicked.has(q)),
      15 - unscoredQuestions.length,
      doShuffle,
      {
        targetStyleCounts: unscoredBlueprint.styleCounts,
        targetMultiCount: unscoredBlueprint.multiTarget,
        conceptCap: Math.max(2, Math.ceil(65 / 14)),
        fillToCount: true,
        initialConceptCounts: scoredConceptCounts,
        usedClusters: scoredClusters,
        recentPenaltyMaps
      }
    ));
  }

  const combinedEntries = [
    ...scoredQuestions.map((q) => ({ q, counted: true })),
    ...unscoredQuestions.map((q) => ({ q, counted: false }))
  ];
  const orderedEntries = doShuffle ? shuffle(combinedEntries) : combinedEntries;

  return {
    quiz: orderedEntries.map((entry) => entry.q),
    scoredIndices: new Set(orderedEntries.map((entry, idx) => entry.counted ? idx : null).filter((idx) => idx !== null))
  };
}

function startQuiz() {
  const doShuffle = document.getElementById('shuffle-toggle').checked;
  shuffleEnabled = doShuffle;
  let pool = selectedDomain === "all" ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.domain == selectedDomain);
  if (doShuffle) pool = shuffle(pool);
  let count = parseInt(document.getElementById('q-count').value);
  if (count === 0 || count > pool.length) count = pool.length;

  officialSimulation = false;
  scoredQuestionIndices = new Set();
  reviewMarks = new Set();
  remainingSeconds = 0;

  // Use weighted draw for official-length when all domains selected
  if (count === 65 && selectedDomain === "all") {
    officialSimulation = true;
    const built = buildOfficialSimulationQuiz(pool, doShuffle);
    quiz = built.quiz;
    scoredQuestionIndices = built.scoredIndices;
    saveRecentOfficialExamHistory(quiz);
  } else {
    const genericBlueprint = buildExamBlueprint(pool, count, count >= 50 ? 'scored' : 'generic');
    const practicePenaltyMaps = buildRecentPenaltyMaps(loadRecentPracticeHistory());
    quiz = pickDiverse(pool, count, doShuffle, {
      targetStyleCounts: genericBlueprint.styleCounts,
      targetMultiCount: genericBlueprint.multiTarget,
      conceptCap: Math.max(1, Math.ceil(count / 14)),
      recentPenaltyMaps: practicePenaltyMaps
    });
    scoredQuestionIndices = new Set(Array.from({ length: quiz.length }, (_, i) => i));
  }

  quiz = quiz.map((q) => cloneQuestionWithShuffledOptions(q, doShuffle));
  if (!officialSimulation) saveRecentPracticeHistory(quiz);

  lastQuizSet = quiz.map((q, i) => ({
    index: i + 1,
    domain: q.domain,
    task: q.task,
    type: q.multi ? `multi-${q.ans.length}` : 'single',
    scored: scoredQuestionIndices.has(i),
    q: q.q,
    opts: [...q.opts],
    ans: q.multi ? [...q.ans] : [q.ans]
  }));

  current = 0; score = 0; wrong = 0; results = new Array(quiz.length).fill(null); answered = false; seconds = 0;

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  startTimer();
  renderQuestion();
}

function chooseAgentPicks(q) {
  const highConfidence = Math.random() < 0.82;
  if (!q.multi) {
    if (highConfidence) return [q.ans];
    const wrongs = q.opts.map((_, i) => i).filter((i) => i !== q.ans);
    return [wrongs[Math.floor(Math.random() * wrongs.length)]];
  }

  const need = q.ans.length;
  if (highConfidence) return [...q.ans];

  const allIdx = q.opts.map((_, i) => i);
  const picks = [];
  while (picks.length < need && allIdx.length) {
    const r = Math.floor(Math.random() * allIdx.length);
    picks.push(allIdx.splice(r, 1)[0]);
  }

  const sortedPicks = [...picks].sort((a, b) => a - b);
  const sortedAns = [...q.ans].sort((a, b) => a - b);
  const isCorrect = sortedPicks.length === sortedAns.length && sortedPicks.every((v, i) => v === sortedAns[i]);
  if (isCorrect) {
    const wrongPool = q.opts.map((_, i) => i).filter((i) => !q.ans.includes(i));
    if (wrongPool.length) {
      sortedPicks[0] = wrongPool[Math.floor(Math.random() * wrongPool.length)];
    }
  }
  return sortedPicks;
}

function runAgentStep() {
  if (!agentRun || !agentRun.active) return;
  if (current >= quiz.length) return;

  const q = quiz[current];
  if (!results[current]) {
    const picks = chooseAgentPicks(q);
    if (q.multi) {
      picks.forEach((p) => selectOption(p));
      submitAnswer();
    } else {
      selectOption(picks[0]);
    }
  }

  const moveDelay = 250 + Math.floor(Math.random() * 700);
  if (current < quiz.length - 1) {
    setTimeout(() => {
      nextQuestion();
      setTimeout(runAgentStep, moveDelay);
    }, moveDelay);
  } else {
    setTimeout(() => {
      agentRun.active = false;
      nextQuestion();
    }, moveDelay);
  }
}

}

function downloadText(filename, content) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportLastQuizSetMarkdown() {
  if (!lastQuizSet || lastQuizSet.length === 0) return;
  const lines = [];
  lines.push('# Generated Quiz Set');
  lines.push('');
  lines.push(`Total questions: ${lastQuizSet.length}`);
  lines.push(`Generated at: ${new Date().toISOString()}`);
  lines.push('');

  lastQuizSet.forEach((item) => {
    const scoredTag = item.scored ? 'Scored' : 'Unscored';
    lines.push(`## Q${item.index} | Domain ${item.domain} | Task ${item.task} | ${item.type} | ${scoredTag}`);
    lines.push(item.q);
    lines.push('');
    const letters = 'ABCDE';
    item.opts.forEach((opt, idx) => lines.push(`${letters[idx]}) ${opt}`));
    lines.push('');
  });

  downloadText('generated_quiz_set_65.md', lines.join('\n'));
}

function startTimer() {
  clearInterval(timerInterval);
  if (officialSimulation) {
    remainingSeconds = 130 * 60;
    const mm = String(Math.floor(remainingSeconds / 60)).padStart(2, '0');
    const ss = String(remainingSeconds % 60).padStart(2, '0');
    document.getElementById('timer-text').textContent = `${mm}:${ss}`;
    timerInterval = setInterval(() => {
      remainingSeconds--;
      const m = String(Math.floor(Math.max(remainingSeconds, 0) / 60)).padStart(2, '0');
      const s = String(Math.max(remainingSeconds, 0) % 60).padStart(2, '0');
      document.getElementById('timer-text').textContent = `${m}:${s}`;
      if (remainingSeconds <= 0) {
        clearInterval(timerInterval);
        showResults();
      }
    }, 1000);
    return;
  }
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById('timer-text').textContent = `${m}:${s}`;
  }, 1000);
}

let multiSelections = [];

function shouldRevealAnswersDuringQuiz() {
  return !officialSimulation;
}

function buildStoredResponse(q, picks, counted) {
  const normalizedPicks = Array.isArray(picks) ? [...picks] : [];
  const correctIndices = q.multi ? [...q.ans] : [q.ans];
  const sortedPicks = [...normalizedPicks].sort((a, b) => a - b);
  const sortedCorrect = [...correctIndices].sort((a, b) => a - b);
  const isCorrect = sortedPicks.length === sortedCorrect.length && sortedPicks.every((v, i) => v === sortedCorrect[i]);
  const skipped = normalizedPicks.length === 0;
  return {
    q: q.q,
    correct: skipped ? false : isCorrect,
    yourAnswer: skipped ? 'Skipped' : normalizedPicks.map(i => q.opts[i]).join(', '),
    rightAnswer: correctIndices.map(i => q.opts[i]).join(', '),
    explain: q.explain,
    _picks: normalizedPicks,
    _counted: counted
  };
}

function persistOfficialResponse(picks) {
  const normalizedPicks = Array.isArray(picks) ? [...picks] : [];
  results[current] = buildStoredResponse(quiz[current], normalizedPicks, scoredQuestionIndices.has(current));
  updateOfficialExamPanel();
}

function isAnsweredIndex(i) {
  const stored = results[i];
  return !!(stored && Array.isArray(stored._picks) && stored._picks.length > 0);
}

function gotoQuestion(i) {
  if (i < 0 || i >= quiz.length) return;
  current = i;
  renderQuestion();
}

function updateOfficialExamPanel() {
  const panel = document.getElementById('exam-panel');
  if (!officialSimulation) {
    panel.classList.add('hidden');
    return;
  }

  panel.classList.remove('hidden');
  const answeredCount = results.filter((r) => r && Array.isArray(r._picks) && r._picks.length > 0).length;
  const markedCount = reviewMarks.size;
  const unansweredCount = quiz.length - answeredCount;
  document.getElementById('sum-answered').textContent = `Answered: ${answeredCount}`;
  document.getElementById('sum-marked').textContent = `Marked: ${markedCount}`;
  document.getElementById('sum-unanswered').textContent = `Unanswered: ${unansweredCount}`;

  const palette = document.getElementById('question-palette');
  palette.innerHTML = quiz.map((_, i) => {
    const classes = [
      'palette-btn',
      i === current ? 'current' : '',
      isAnsweredIndex(i) ? 'answered' : '',
      reviewMarks.has(i) ? 'marked' : ''
    ].filter(Boolean).join(' ');
    return `<button class="${classes}" onclick="gotoQuestion(${i})">${i + 1}</button>`;
  }).join('');
}

function renderQuestion() {
  const q = quiz[current];
  const storedResponse = results[current];
  const alreadyAnswered = storedResponse !== null;
  answered = officialSimulation ? false : alreadyAnswered;
  multiSelections = storedResponse && Array.isArray(storedResponse._picks) ? [...storedResponse._picks] : [];
  document.getElementById('s-question').textContent = `${current+1}/${quiz.length}`;
  if (officialSimulation) {
    const answeredCount = results.filter((r) => r && Array.isArray(r._picks) && r._picks.length > 0).length;
    document.getElementById('s-correct').textContent = answeredCount;
    document.getElementById('s-wrong').textContent = reviewMarks.size;
    document.getElementById('s-correct-label').textContent = 'Answered';
    document.getElementById('s-wrong-label').textContent = 'Marked';
  } else {
    document.getElementById('s-correct').textContent = score;
    document.getElementById('s-wrong').textContent = wrong;
    document.getElementById('s-correct-label').textContent = 'Correct';
    document.getElementById('s-wrong-label').textContent = 'Wrong';
  }
  document.getElementById('progress-bar').style.width = `${((current + 1)/quiz.length)*100}%`;
  document.getElementById('q-domain').textContent = DOMAIN_NAMES[q.domain] + ` \u2022 Task ${q.task}`;
  const scoredHint = '';
  document.getElementById('q-number').textContent = `Question ${current+1} of ${quiz.length}${scoredHint}`;
  document.getElementById('q-text').textContent = q.q;

  const isMulti = q.multi;
  const requiredCount = isMulti ? q.ans.length : 1;
  let hintHtml = '';
  if (isMulti) {
    hintHtml = `<div class="multi-hint">Select ${requiredCount} answers</div>`;
  }

  const letters = 'ABCDE';
  const optsHtml = q.opts.map((opt, i) =>
    `<div class="option" data-idx="${i}" onclick="selectOption(${i})">
      <span class="letter">${letters[i]}</span><span>${opt}</span>
    </div>`
  ).join('');
  document.getElementById('q-options').innerHTML = hintHtml + optsHtml;

  const exp = document.getElementById('q-explanation');

  // Restore state if already answered (navigating back)
  if (alreadyAnswered) {
    const optEls = document.querySelectorAll('.option');
    const r = results[current];
    const pickedIndices = r && Array.isArray(r._picks) ? r._picks : [];
    optEls.forEach(el => {
      const i = parseInt(el.dataset.idx);
      if (pickedIndices.includes(i)) el.classList.add('picked');
    });

    if (officialSimulation) {
      exp.classList.remove('show');
      exp.textContent = '';
    } else if (shouldRevealAnswersDuringQuiz()) {
      optEls.forEach(el => el.classList.add('disabled'));
      const correctIndices = isMulti ? q.ans : [q.ans];
      optEls.forEach(el => {
        const i = parseInt(el.dataset.idx);
        if (correctIndices.includes(i)) el.classList.add('correct');
      });
      if (!r.correct && r.yourAnswer !== 'Skipped') {
        pickedIndices.forEach(i => { if (!correctIndices.includes(i)) optEls[i].classList.add('wrong'); });
      }
      exp.textContent = q.explain;
      exp.classList.add('show');
    } else {
      exp.classList.remove('show');
      exp.textContent = '';
    }
  } else {
    exp.classList.remove('show');
    exp.textContent = '';
  }

  document.getElementById('btn-flag').classList.remove('hidden');
  document.getElementById('btn-clear').classList.toggle('hidden', !officialSimulation);
  document.getElementById('btn-prev').classList.toggle('hidden', current === 0);
  document.getElementById('btn-submit').classList.add('hidden');
  document.getElementById('btn-next').classList.remove('hidden');
  if (officialSimulation) {
    const flagBtn = document.getElementById('btn-flag');
    flagBtn.innerHTML = reviewMarks.has(current)
      ? '<span class="flag-icon"></span> Unmark Review'
      : '<span class="flag-icon"></span> Mark for Review';
    flagBtn.title = 'Mark or unmark this question for review';
    document.getElementById('btn-next').textContent = current < quiz.length - 1 ? 'Next' : 'Finish Exam';
  } else if (alreadyAnswered) {
    const flagBtn = document.getElementById('btn-flag');
    flagBtn.innerHTML = '<span class="flag-icon"></span> Report error';
    flagBtn.title = 'Report an error in this question via GitHub';
    document.getElementById('btn-next').textContent = current < quiz.length - 1 ? 'Next' : 'See Results';
  } else {
    const flagBtn = document.getElementById('btn-flag');
    flagBtn.innerHTML = '<span class="flag-icon"></span> Report error';
    flagBtn.title = 'Report an error in this question via GitHub';
    document.getElementById('btn-next').textContent = 'Submit';
  }
  updateOfficialExamPanel();
}

function selectOption(idx) {
  if (answered) return;
  const q = quiz[current];

  if (officialSimulation) {
    if (!q.multi) {
      multiSelections = [idx];
    } else {
      const requiredCount = q.ans.length;
      const pos = multiSelections.indexOf(idx);
      if (pos > -1) {
        multiSelections.splice(pos, 1);
      } else {
        if (multiSelections.length >= requiredCount) return;
        multiSelections.push(idx);
      }
    }

    const optEls = document.querySelectorAll('.option');
    optEls.forEach(el => {
      const i = parseInt(el.dataset.idx);
      el.classList.toggle('picked', multiSelections.includes(i));
    });
    persistOfficialResponse(multiSelections);
    return;
  }

  // Single-answer practice mode: select first; Next submits.
  if (!q.multi) {
    multiSelections = [idx];
    const optEls = document.querySelectorAll('.option');
    optEls.forEach(el => {
      const i = parseInt(el.dataset.idx);
      el.classList.toggle('picked', i === idx);
    });
    document.getElementById('btn-submit').classList.add('hidden');
    return;
  }

  // Multi-answer: toggle selection
  const requiredCount = q.ans.length;
  const pos = multiSelections.indexOf(idx);
  if (pos > -1) {
    multiSelections.splice(pos, 1);
  } else {
    if (multiSelections.length >= requiredCount) return; // already selected enough
    multiSelections.push(idx);
  }

  // Update visual state
  const optEls = document.querySelectorAll('.option');
  optEls.forEach(el => {
    const i = parseInt(el.dataset.idx);
    el.classList.toggle('picked', multiSelections.includes(i));
  });

  document.getElementById('btn-submit').classList.add('hidden');
}

function submitAnswer() {
  const q = quiz[current];
  if (q && q.multi) submitMulti();
  else submitSingle();
}

function submitSingle() {
  if (answered || multiSelections.length !== 1) return;
  answered = true;
  const q = quiz[current];
  const idx = multiSelections[0];
  const correctIndices = [q.ans];
  const isCorrect = correctIndices.includes(idx);

  const optEls = document.querySelectorAll('.option');
  optEls.forEach(el => {
    el.classList.add('disabled');
    const i = parseInt(el.dataset.idx);
    if (i === idx) el.classList.add('picked');
  });

  const counted = scoredQuestionIndices.has(current);
  if (!isCorrect) {
    if (shouldRevealAnswersDuringQuiz()) optEls[idx].classList.add('wrong');
    if (counted) wrong++;
  } else {
    if (counted) score++;
  }

  if (shouldRevealAnswersDuringQuiz()) {
    optEls.forEach(el => {
      const i = parseInt(el.dataset.idx);
      if (correctIndices.includes(i)) el.classList.add('correct');
    });
  }

  results[current] = { q: q.q, correct: isCorrect, yourAnswer: q.opts[idx], rightAnswer: correctIndices.map(i => q.opts[i]).join(', '), explain: q.explain, _picks: [idx], _counted: counted };
  showPostAnswer();
}

function submitMulti() {
  if (answered) return;
  answered = true;
  const q = quiz[current];
  const correctIndices = q.ans;
  const picked = [...multiSelections].sort();
  const expected = [...correctIndices].sort();
  const isCorrect = picked.length === expected.length && picked.every((v, i) => v === expected[i]);

  const optEls = document.querySelectorAll('.option');
  optEls.forEach(el => {
    el.classList.remove('picked');
    el.classList.add('disabled');
    const i = parseInt(el.dataset.idx);
    if (multiSelections.includes(i)) el.classList.add('picked');
  });

  if (shouldRevealAnswersDuringQuiz()) {
    optEls.forEach(el => {
      const i = parseInt(el.dataset.idx);
      if (correctIndices.includes(i)) el.classList.add('correct');
      if (multiSelections.includes(i) && !correctIndices.includes(i)) el.classList.add('wrong');
    });
  }

  const counted = scoredQuestionIndices.has(current);
  if (!isCorrect) {
    if (counted) wrong++;
  } else {
    if (counted) score++;
  }

  results[current] = { q: q.q, correct: isCorrect, yourAnswer: multiSelections.map(i => q.opts[i]).join(', '), rightAnswer: correctIndices.map(i => q.opts[i]).join(', '), explain: q.explain, _picks: [...multiSelections], _counted: counted };
  showPostAnswer();
}

function showPostAnswer() {
  if (officialSimulation) {
    const answeredCount = results.filter((r) => r && Array.isArray(r._picks) && r._picks.length > 0).length;
    document.getElementById('s-correct').textContent = answeredCount;
    document.getElementById('s-wrong').textContent = reviewMarks.size;
  } else {
    document.getElementById('s-correct').textContent = score;
    document.getElementById('s-wrong').textContent = wrong;
  }

  const exp = document.getElementById('q-explanation');
  if (shouldRevealAnswersDuringQuiz()) {
    exp.textContent = quiz[current].explain;
    exp.classList.add('show');
  } else {
    exp.textContent = '';
    exp.classList.remove('show');
  }

  document.getElementById('btn-submit').classList.add('hidden');
  document.getElementById('btn-next').classList.remove('hidden');
  document.getElementById('btn-next').textContent = current < quiz.length - 1 ? 'Next' : 'See Results';
  updateOfficialExamPanel();
}

function prevQuestion() {
  if (current > 0) { current--; renderQuestion(); }
}

function nextQuestion() {
  if (!officialSimulation && !answered && quiz[current]) {
    const requiredCount = quiz[current].multi ? quiz[current].ans.length : 1;
    if (multiSelections.length === requiredCount) submitAnswer();
    return;
  }

  if (current < quiz.length - 1) { current++; renderQuestion(); }
  else showResults();
}

function toggleFlag() {
  if (officialSimulation) {
    if (reviewMarks.has(current)) reviewMarks.delete(current);
    else reviewMarks.add(current);
    renderQuestion();
    return;
  }

  const q = quiz[current];
  const letters = 'ABCDE';
  const ansIdxs = q.multi ? q.ans : [q.ans];
  const correctAns = ansIdxs.map(i => `${letters[i]}) ${q.opts[i]}`).join('\n');
  const allOpts = q.opts.map((o, i) => `${letters[i]}) ${o}`).join('\n');

  const title = encodeURIComponent(`[Flag] D${q.domain} T${q.task}: ${q.q.substring(0, 60)}...`);
  const body = encodeURIComponent(
`## Flagged Question

**Domain:** ${q.domain} — ${DOMAIN_NAMES[q.domain]}
**Task:** ${q.task}

### Question
${q.q}

### Options
${allOpts}

### Current Answer
${correctAns}

### Explanation
${q.explain}

---
**What seems wrong?**
<!-- Describe the issue: wrong answer, outdated info, unclear wording, etc. -->

`);
  window.open(`https://github.com/${GITHUB_REPO}/issues/new?title=${title}&body=${body}&labels=flagged-question`, '_blank');
}

function clearCurrentResponse() {
  if (!officialSimulation) return;
  multiSelections = [];
  persistOfficialResponse([]);
  renderQuestion();
}

function showResults() {
  if (officialSimulation) {
    results = quiz.map((q, i) => {
      const stored = results[i];
      const picks = stored && Array.isArray(stored._picks) ? stored._picks : [];
      return buildStoredResponse(q, picks, scoredQuestionIndices.has(i));
    });
  } else {
    // Mark any unanswered questions as skipped
    results.forEach((r, i) => {
      if (r === null) {
        results[i] = buildStoredResponse(quiz[i], [], scoredQuestionIndices.has(i));
      }
    });
  }
  const isCounted = (i) => scoredQuestionIndices.has(i);
  score = results.filter((r, i) => r.correct && isCounted(i)).length;
  wrong = results.filter((r, i) => !r.correct && isCounted(i)).length;

  clearInterval(timerInterval);
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('progress-bar').style.width = '100%';

  const scoredTotal = officialSimulation ? 50 : quiz.length;
  const pct = Math.round((score / scoredTotal) * 100);
  const elapsed = officialSimulation ? ((130 * 60) - Math.max(remainingSeconds, 0)) : seconds;
  const m = String(Math.floor(elapsed/60)).padStart(2,'0');
  const s = String(elapsed%60).padStart(2,'0');

  // Domain breakdown
  const domainScores = {};
  quiz.forEach((q, i) => {
    if (!isCounted(i)) return;
    if (!domainScores[q.domain]) domainScores[q.domain] = { total: 0, correct: 0 };
    domainScores[q.domain].total++;
    if (results[i].correct) domainScores[q.domain].correct++;
  });

  let bdHtml = '';
  for (const d in domainScores) {
    const ds = domainScores[d];
    const dp = Math.round((ds.correct / ds.total) * 100);
    const color = dp >= 80 ? '#22c55e' : (dp >= 60 ? '#ff9900' : '#ef4444');
    bdHtml += `<div class="bd-item"><div class="bd-domain">${DOMAIN_NAMES[d]}</div><div class="bd-score" style="color:${color}">${ds.correct}/${ds.total} (${dp}%)</div></div>`;
  }

  // Review wrong answers
  let reviewHtml = '';
  results.forEach((r, i) => {
    if (!r.correct && isCounted(i)) {
      reviewHtml += `<div class="review-item">
        <div class="ri-header"><span class="ri-status wrong">${r.yourAnswer === 'Skipped' ? 'SKIPPED' : 'WRONG'}</span></div>
        <div class="ri-q">${i+1}. ${r.q}</div>
        <div class="ri-answer">Your answer: ${r.yourAnswer}<br>Correct: ${r.rightAnswer}<br>${r.explain}</div>
      </div>`;
    }
  });

  const el = document.getElementById('results-screen');
  const summaryLine = officialSimulation
    ? 'Exam simulation mode: 65-question session, timed at 130 minutes. Review based on your submitted responses.'
    : 'Official SAA-C03 scoring is scaled (100-1000, passing score 720). This practice quiz reports percent correct.';
  const agentLine = agentRun && !agentRun.active
    ? '<p style="color:#22c55e">Agent attempt completed (human-like pacing).</p>'
    : '';
  const exportButton = (quiz.length === 65 && lastQuizSet.length === 65)
    ? '<button class="btn btn-outline" onclick="exportLastQuizSetMarkdown()">Download This 65Q Set</button>'
    : '';
  el.innerHTML = `
    <h2>Practice Results</h2>
    <p style="color:#889">${summaryLine}</p>
    ${agentLine}
    <div class="score-circle score">
      ${pct}%
      <span class="pct-label">${score}/${scoredTotal}</span>
    </div>
    <p style="color:#889;margin-bottom:8px">Time: ${m}:${s}</p>
    <div class="breakdown">${bdHtml}</div>
    ${reviewHtml ? '<h3 style="margin:20px 0 12px;text-align:left">Review incorrect answers</h3>' : '<p style="color:#22c55e;font-weight:600">Perfect score!</p>'}
    <div class="review-list">${reviewHtml}</div>
    <div class="actions" style="margin-top:30px">
      ${exportButton}
      <button class="btn btn-outline" onclick="retryWrong()">Retry Wrong Only</button>
      <button class="btn" onclick="restart()">New Quiz</button>
    </div>
  `;
  el.classList.remove('hidden');
}

function restart() {
  agentRun = null;
  reviewMarks = new Set();
  remainingSeconds = 0;
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
}

function retryWrong() {
  agentRun = null;
  const wrongQs = quiz.filter((q, i) => results[i] && !results[i].correct);
  if (wrongQs.length === 0) { restart(); return; }
  quiz = shuffleEnabled ? shuffle([...wrongQs]) : [...wrongQs];
  officialSimulation = false;
  reviewMarks = new Set();
  remainingSeconds = 0;
  scoredQuestionIndices = new Set(Array.from({ length: quiz.length }, (_, i) => i));
  current = 0; score = 0; wrong = 0; results = new Array(quiz.length).fill(null); answered = false; seconds = 0;
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  startTimer();
  renderQuestion();
}

OPTION_HINT_AUDIT = sanitizeQuestionOptionHints(RAW_QUESTIONS);
QUESTION_AUDIT = auditAndFilterQuestions(OPTION_HINT_AUDIT.cleaned);
QUESTIONS = OPTION_HINT_AUDIT.cleaned;
updateQuestionPoolUi();
console.log('Option hint cleanup report:', OPTION_HINT_AUDIT.report);
console.log('Question audit report:', QUESTION_AUDIT.report);
</script>
